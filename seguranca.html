    <h1>Gerador de senhas</h1>

    <p>Nesta página aqui você pode geral uma senha segura.</p>

    <input type="number" id="tamanho" placeholder="Tamanho da senha">
    <button onclick="gerarsenha(Number(document.querySelector('input[type=\'number\']').value))">gerar senha</button>
    <h2>Senhas geradas</h2>
    <br>
    <ol id="resultado">

    </ol>

    <script>

        function gerarsenha(tamanho){
            const caracteres = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#*'
            let resultado = ""
            for (let i = 0; i < tamanho; i++)
                resultado += caracteres.charAt(Math.floor(Math.random() * caracteres.length));

            let listItem = document.createElement("li")
            listItem.textContent = resultado
            document.getElementById('resultado').appendChild(listItem);
        }
    </script>
